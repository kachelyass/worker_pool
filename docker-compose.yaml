services:
  postgres:
    image: postgres:16
    container_name: tasks-postgres
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: "pass"
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 2s
      timeout: 5s
      retries: 2


  migrate:
    image: migrate/migrate:v4.16.2
    container_name: migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    entrypoint: ["migrate"]
    command:
      - "-path=/migrations"
      - "-database=postgres://user:pass@postgres:5432/db?sslmode=disable"
      - "up"
    restart: on-failure

volumes:
  pg_data:
    name: pg_data