global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: api
    static_configs:
      - targets: ["api:8080"]

  - job_name: consumer
    static_configs:
      - targets: ["consumer:8082"]

  - job_name: worker
    static_configs:
      - targets: [ "worker:8081" ]